<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>מעקב מדדים</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
      margin: 0;
      padding: 18px;
      direction: rtl;
    }

    .app {
      max-width: 440px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 22px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      margin: 0 0 14px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .users {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .user-btn {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #ddd;
      background: #f5f5f5;
      color: #111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .user-btn.active {
      background: #111;
      color: white;
      border-color: #111;
    }

    .current-user {
      background: #f7f7f7;
      padding: 10px;
      border-radius: 14px;
      text-align: center;
      margin-bottom: 16px;
      font-weight: bold;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, textarea, button {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .save-btn {
      background: #111;
      color: white;
      border: none;
      margin-top: 18px;
      cursor: pointer;
      font-weight: bold;
      font-size: 17px;
    }

    h2 {
      margin-top: 24px;
      font-size: 22px;
    }

    .record {
      background: #f2f4f7;
      padding: 13px;
      border-radius: 15px;
      margin-top: 10px;
      line-height: 1.7;
    }

    .record strong {
      font-size: 16px;
    }

    .delete {
      background: #c0392b;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .empty {
      text-align: center;
      color: #777;
      background: #f7f7f7;
      padding: 16px;
      border-radius: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>📊 מעקב מדדים</h1>
  <div class="subtitle">בחר משתמש, הזן מדידה ושמור היסטוריה נפרדת</div>

  <div class="users">
    <button class="user-btn active" id="btnLiraz" onclick="selectUser('לירז')">👨 לירז</button>
    <button class="user-btn" id="btnEinat" onclick="selectUser('עינת')">👩 עינת</button>
  </div>

  <div class="current-user" id="currentUserText">משתמש נבחר: לירז</div>

  <label>📅 תאריך</label>
  <input type="date" id="date">

  <label>⚖️ משקל</label>
  <input type="number" id="weight" placeholder="לדוגמה: 80">

  <label>📏 מותניים</label>
  <input type="number" id="waist" placeholder="לדוגמה: 90">

  <label>📐 חזה</label>
  <input type="number" id="chest" placeholder="לדוגמה: 100">

  <label>💪 זרוע</label>
  <input type="number" id="arm" placeholder="לדוגמה: 35">

  <label>📝 הערות</label>
  <textarea id="notes" placeholder="הערה חופשית"></textarea>

  <label>📸 תמונת גוף</label>
  <input type="file" id="bodyPhoto" accept="image/*">
  <img id="photoPreview" style="display:none;width:100%;margin-top:10px;border-radius:16px;">


  <button class="save-btn" onclick="saveRecord()">💾 שמור מדידה</button>

  <h2>📋 היסטוריה</h2>
  <div id="history"></div>
</div>

<script>
  let currentUser = localStorage.getItem("currentUser") || "לירז";
  let selectedPhoto = "";

  document.addEventListener("change", function(event){
    if(event.target && event.target.id==="bodyPhoto"){
      const file = event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        selectedPhoto = e.target.result;
        const img = document.getElementById("photoPreview");
        img.src = selectedPhoto;
        img.style.display = "block";
      };
      reader.readAsDataURL(file);
    }
  });

  const dateInput = document.getElementById("date");
  dateInput.valueAsDate = new Date();

  function storageKey() {
    return "records_" + currentUser;
  }

  function getRecords() {
    return JSON.parse(localStorage.getItem(storageKey()) || "[]");
  }

  function saveRecords(records) {
    localStorage.setItem(storageKey(), JSON.stringify(records));
  }

  function selectUser(user) {
    currentUser = user;
    localStorage.setItem("currentUser", currentUser);

    document.getElementById("btnLiraz").classList.remove("active");
    document.getElementById("btnEinat").classList.remove("active");

    if (currentUser === "לירז") {
      document.getElementById("btnLiraz").classList.add("active");
    } else {
      document.getElementById("btnEinat").classList.add("active");
    }

    document.getElementById("currentUserText").innerText = "משתמש נבחר: " + currentUser;
    showHistory();
  }

  function saveRecord() {
    const record = {
      date: document.getElementById("date").value,
      weight: document.getElementById("weight").value,
      waist: document.getElementById("waist").value,
      chest: document.getElementById("chest").value,
      arm: document.getElementById("arm").value,
      notes: document.getElementById("notes").value,
      photo: selectedPhoto
    };

    if (!record.date) {
      alert("נא לבחור תאריך");
      return;
    }

    if (!record.weight && !record.waist && !record.chest && !record.arm && !record.notes) {
      alert("נא להזין לפחות נתון אחד");
      return;
    }

    const records = getRecords();
    records.unshift(record);
    saveRecords(records);

    document.getElementById("weight").value = "";
    document.getElementById("waist").value = "";
    document.getElementById("chest").value = "";
    document.getElementById("arm").value = "";
    document.getElementById("notes").value = "";
    selectedPhoto = "";
    document.getElementById("bodyPhoto").value = "";
    document.getElementById("photoPreview").style.display = "none";

    showHistory();
  }

  function deleteRecord(index) {
    if (!confirm("למחוק את המדידה הזאת?")) return;

    const records = getRecords();
    records.splice(index, 1);
    saveRecords(records);
    showHistory();
  }

  function showHistory() {
    const history = document.getElementById("history");
    const records = getRecords();

    history.innerHTML = "";

    if (records.length === 0) {
      history.innerHTML = '<div class="empty">אין עדיין מדידות עבור ' + currentUser + '</div>';
      return;
    }

    records.forEach((r, index) => {
      history.innerHTML += `
        <div class="record">
          <strong>📅 ${r.date}</strong><br>
          👤 משתמש: ${currentUser}<br>
          ⚖️ משקל: ${r.weight || "-"}<br>
          📏 מותניים: ${r.waist || "-"}<br>
          📐 חזה: ${r.chest || "-"}<br>
          💪 זרוע: ${r.arm || "-"}<br>
          📝 הערות: ${r.notes || "-"}
          <button class="delete" onclick="deleteRecord(${index})">🗑️ מחק</button>
        </div>
      `;
    });
  }

  selectUser(currentUser);
</script>

</body>
</html>
